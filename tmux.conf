# ----- Basics -----
# Use zsh if available (needed on systems where login shell is bash)
run-shell 'tmux set -g default-shell "$(command -v zsh || echo /bin/bash)"'

set -g mouse on

# macOS clipboard support (conditional)
if-shell "command -v reattach-to-user-namespace" \
  "set -g default-command 'reattach-to-user-namespace -l zsh'"

# Start window/pane numbering at 1 (easier to reach than 0)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Longer scrollback history
set -g history-limit 50000

# Faster key repetition (default is 500ms)
set -s escape-time 0

# Bind prefix to Ctrl+Space
unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

# ----- Navigation -----
# Format window current view
set -g window-status-current-format ' #I:#W '
set -g window-status-style 'fg=colour244'  # dim inactive windows
set -g window-status-current-style 'fg=white bold'

# Intuitive splits (open in current directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window in current directory
bind c new-window -c "#{pane_current_path}"

# Navigate panes with Alt+arrow (no prefix needed)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resize with Shift+arrow (no prefix needed)
bind -n S-Left resize-pane -L 2
bind -n S-Right resize-pane -R 2
bind -n S-Up resize-pane -U 2
bind -n S-Down resize-pane -D 2

# ----- Quality of life -----
# Easy config reload
bind r source-file ~/.tmux.conf \; display "Reloaded"

# Don't rename windows automatically
set -g allow-rename off

# Activity alerts
setw -g monitor-activity on
set -g visual-activity off

# ----- Appearance -----
# Better colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Cleaner status bar
set -g status-style bg=default,fg=white
set -g status-left "[#S] "
set -g status-right "%H:%M"

# ---- Passing through to terminal (e.g. Shift+Enter) ----
set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'
